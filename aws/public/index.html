<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goalkeeper Stats</title>
  <style>
    :root { --bg: #0c0f14; --panel: #121720; --muted: #8492a6; --text: #e8eefc; --accent: #3aa0ff; --success: #22c55e; --danger: #ef4444; --radius: 16px; }
    html,body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;margin:0;min-height:100vh}
    .container{max-width:720px;margin:0 auto;padding:16px}
    h1{font-size:24px;text-align:center;margin:0 0 8px}
    .card{background:var(--panel);border-radius:var(--radius);padding:20px}
    .stack{display:grid;gap:12px}
    label{font-size:14px;color:var(--muted);display:block;margin-bottom:4px}
    input{font-size:16px;border-radius:12px;border:1px solid #1f2733;background:#0f1520;color:var(--text);padding:14px;width:100%;box-sizing:border-box}
    button{font-size:16px;border-radius:12px;border:1px solid #1f2733;background:#0f1520;color:var(--text);padding:14px;width:100%;cursor:pointer;font-weight:600}
    button.primary{background:var(--accent);color:#001e3c;border:none}
    .tabs{display:flex;gap:4px;margin-bottom:16px;background:#0f1520;padding:4px;border-radius:12px}
    .tab{flex:1;padding:14px;text-align:center;border-radius:8px;cursor:pointer;font-size:16px;font-weight:600;color:var(--muted);-webkit-tap-highlight-color:transparent}
    .tab.active{background:var(--accent);color:#001e3c}
    .hidden{display:none}
    .mt-2{margin-top:8px}
    .mb-4{margin-bottom:16px}
    .muted{color:var(--muted)}
    .text-center{text-align:center}
    .error{color:var(--danger);text-align:center;font-size:14px}
  </style>
</head>
<body>
  <div class="container">
    <div id="screen-auth">
      <div class="card">
        <h1>🥅 Goalkeeper Stats</h1>
        <p class="muted text-center mb-4">Track your performance</p>
        
        <div class="tabs">
          <div class="tab active" id="tab-login" onclick="showTab('login')">Login</div>
          <div class="tab" id="tab-register" onclick="showTab('register')">Register</div>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)">
          <div id="field-username">
            <label>Username</label>
            <input type="text" id="username" />
          </div>
          
          <div class="mt-2">
            <label>Email</label>
            <input type="email" id="email" required />
          </div>
          
          <div class="mt-2">
            <label>Password</label>
            <input type="password" id="password" required minlength="8" />
          </div>
          
          <div id="field-name" class="mt-2 hidden">
            <label>Display Name</label>
            <input type="text" id="display-name" />
          </div>
          
          <button type="submit" class="primary mt-4" id="auth-btn">Login</button>
        </form>
        
        <p id="auth-error" class="error mt-2"></p>
      </div>
    </div>

    <div id="screen-main" class="hidden">
      <h1>🥅 GK Stats</h1>
      <button onclick="logout()" class="mb-4">Logout</button>
      <button class="primary mb-4" onclick="openModal('player-modal')">+ Add Goalkeeper</button>
      <div id="players-list"></div>
    </div>
  </div>

  <div id="player-modal" class="modal hidden">
    <div class="card">
      <h2>Add Goalkeeper</h2>
      <form onsubmit="handlePlayerSubmit(event)">
        <div><label>Name</label><input type="text" id="player-name" required /></div>
        <div class="mt-2"><label>Team</label><input type="text" id="player-team" /></div>
        <button type="submit" class="primary mt-4">Add</button>
        <button type="button" onclick="closeModal('player-modal')" class="mt-2">Cancel</button>
      </form>
    </div>
  </div>

  <style>
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;padding:16px}
    .player-card{background:#0f1520;border:1px solid #1f2733;border-radius:12px;padding:14px;margin-bottom:8px}
    .player-card .name{font-weight:600;font-size:18px}
    .player-card .info{font-size:14px;color:var(--muted)}
  </style>

  <script>
    let token = localStorage.getItem('gk_token');
    let currentTab = 'login';

    function showTab(tab) {
      currentTab = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('auth-btn').textContent = tab === 'login' ? 'Login' : 'Register';
      document.getElementById('field-username').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('field-name').classList.toggle('hidden', tab === 'login');
      document.getElementById('username').required = (tab === 'register');
    }

    async function handleAuth(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const displayName = document.getElementById('display-name').value;
      
      const endpoint = currentTab === 'register' ? '/api/auth/register' : '/api/auth/login';
      const body = currentTab === 'register' 
        ? {username, email, password, display_name: displayName}
        : {email, password};
      
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        token = data.token;
        localStorage.setItem('gk_token', token);
        loadUser();
      } catch(err) {
        document.getElementById('auth-error').textContent = err.message;
      }
    }

    async function loadUser() {
      document.getElementById('screen-auth').classList.add('hidden');
      document.getElementById('screen-main').classList.remove('hidden');
      loadMyPlayers();
    }

    async function loadMyPlayers() {
      const c = document.getElementById('players-list');
      try {
        const res = await fetch('/api/players/my', {
          headers: {'Authorization': 'Bearer ' + token}
        });
        const data = await res.json();
        if (!data.players?.length) {
          c.innerHTML = '<p class="muted text-center">No players yet</p>';
          return;
        }
        c.innerHTML = data.players.map(p => 
          '<div class="player-card"><div class="name">'+p.player_name+'</div><div class="info">'+(p.team_name||'')+' - '+(p.matches_played||0)+' matches</div></div>'
        ).join('');
      } catch {
        c.innerHTML = '<p class="error">Error loading</p>';
      }
    }

    async function handlePlayerSubmit(e) {
      e.preventDefault();
      const body = {
        player_name: document.getElementById('player-name').value,
        team_name: document.getElementById('player-team').value
      };
      try {
        const res = await fetch('/api/players', {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('Failed');
        closeModal('player-modal');
        e.target.reset();
        loadMyPlayers();
      } catch {
        alert('Error adding player');
      }
    }

    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function logout() { localStorage.removeItem('gk_token'); token = null; location.reload(); }
    
    if (token) loadUser();
  </script>
</body>
</html>
